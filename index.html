<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YasFlix | お気に入りドラマ・アニメ追跡</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">Yas<span>Flix</span></div>
            <button id="settings-btn" class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </header>

        <main id="main-content">
            <!-- Content will be injected by JS -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>読み込み中...</p>
            </div>
        </main>

        <nav class="bottom-nav">
            <button id="nav-dashboard" class="nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>ホーム</span>
            </button>
            <button id="voice-trigger" class="voice-btn">
                <div class="voice-btn-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </div>
            </button>
            <button id="nav-search" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <span>検索</span>
            </button>
        </nav>

        <!-- Modals -->
        <div id="voice-modal" class="modal hidden">
            <div class="modal-content glass">
                <div class="voice-visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <h3 id="voice-status">お名前をどうぞ...</h3>
                <p id="voice-transcript" class="transcript-preview"></p>
                <button id="close-voice" class="close-btn">キャンセル</button>
            </div>
        </div>

        <div id="settings-modal" class="modal hidden">
            <div class="modal-content glass">
                <h2>サブスク設定</h2>
                <p>契約中のサービスを選択してください</p>
                <div class="provider-grid" id="provider-selector">
                    <!-- Providers will be injected -->
                </div>
                <button id="save-settings" class="primary-btn">保存する</button>
            </div>
        </div>

        <div id="search-results-modal" class="modal hidden">
            <div class="modal-content glass scrollable">
                <h2>検索結果</h2>
                <div id="search-results-list" class="results-list">
                    <!-- Results will be injected -->
                </div>
                <button id="close-results" class="close-btn">閉じる</button>
            </div>
        </div>

        <div id="details-modal" class="modal hidden">
            <div class="modal-content glass show-details-content">
                <div id="details-backdrop" class="details-backdrop"></div>
                <div class="details-body">
                    <h2 id="details-title"></h2>
                    <p id="details-status"></p>
                    <div id="details-episode-info" class="episode-box">
                        <h4 id="details-ep-name"></h4>
                        <p id="details-ep-overview"></p>
                    </div>
                    <div id="details-providers" class="watch-on large"></div>
                    <div class="actions">
                        <button id="remove-show" class="danger-btn">お気に入りから削除</button>
                    </div>
                </div>
                <button id="close-details" class="close-btn">戻る</button>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
